<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- SIDEBAR -->
<div th:fragment="sidebar">
    <aside class="w-64 bg-gray-900 min-h-screen p-4 flex flex-col gap-2">
        <div class="text-white font-bold text-lg mb-6 px-2">Painel Admin</div>
        <a th:href="@{/admin/dashboard}"
           class="flex items-center gap-2 px-3 py-2 rounded text-gray-300 hover:bg-gray-700">
            Dashboard
        </a>
        <a th:href="@{/admin/orcamentos}"
           class="flex items-center gap-2 px-3 py-2 rounded text-gray-300 hover:bg-gray-700">
            Orçamentos
        </a>
        <a th:href="@{/admin/produtos}"
           class="flex items-center gap-2 px-3 py-2 rounded text-gray-300 hover:bg-gray-700">
            Produtos
        </a>
        <a th:href="@{/admin/usuarios}"
           class="flex items-center gap-2 px-3 py-2 rounded text-gray-300 hover:bg-gray-700">
            Usuários
        </a>
        <div class="mt-auto">
            <a th:href="@{/}" class="text-gray-400 text-sm hover:text-white">← Voltar ao site</a>
        </div>
    </aside>
</div>

<!-- ALERTAS -->
<div th:fragment="alertas">
    <div th:if="${sucesso}"
         class="bg-green-100 border border-green-400 text-green-800 px-4 py-3 rounded mb-4">
        <span th:text="${sucesso}"></span>
    </div>
    <div th:if="${erro}"
         class="bg-red-100 border border-red-400 text-red-800 px-4 py-3 rounded mb-4">
        <span th:text="${erro}"></span>
    </div>
</div>

</html>
